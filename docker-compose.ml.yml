# Optional: Redis + Peve ML service for local / staging
# Usage: docker compose -f docker-compose.ml.yml up --build
services:
  redis-ml:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - peve_ml_redis:/data

  peve-ml:
    build:
      context: ./peve-ml-service
      dockerfile: Dockerfile
    ports:
      - "8090:8090"
    environment:
      HOST: 0.0.0.0
      PORT: 8090
      REDIS_URL: redis://redis-ml:6379/0
      CACHE_TTL_SECONDS: 3600
      SKIP_SUMMARIZATION: "false"
      SKIP_LANGUAGE_CHART: "false"
      NEIGHBOR_SEARCH_POOL: "600"
      API_KEY: ${ML_SERVICE_API_KEY:-}
    depends_on:
      - redis-ml

volumes:
  peve_ml_redis: {}
