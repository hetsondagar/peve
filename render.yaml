services:
  - type: web
    name: peve-backend
    env: node
    plan: free
    buildCommand: npm install && npm run build:prod
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: MONGO_URI
        fromDatabase:
          name: peve-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: REFRESH_TOKEN_EXPIRES_IN
        value: 30d
      - key: FRONTEND_URL
        value: https://peve-jointhehive.vercel.app
      - key: CLOUDINARY_CLOUD_NAME
        value: your_cloudinary_cloud_name
      - key: CLOUDINARY_API_KEY
        value: your_cloudinary_api_key
      - key: CLOUDINARY_API_SECRET
        value: your_cloudinary_api_secret
      - key: BCRYPT_ROUNDS
        value: 12
      - key: ML_FETCH_TIMEOUT_MS
        value: 45000
    healthCheckPath: /health
    autoDeploy: true
    branch: main

  # Repository intelligence (SentenceTransformers + SQLite neighbors). Free tier: CPU wheels,
  # no seq2seq summarizer, extractive README gist — copy API_KEY into backend ML_SERVICE_API_KEY.
  - type: web
    name: peve-ml-service
    env: python
    plan: free
    rootDir: peve-ml-service
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt --extra-index-url https://download.pytorch.org/whl/cpu
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    branch: main
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: SKIP_SUMMARIZATION
        value: "true"
      - key: EXTRACTIVE_SUMMARY_FALLBACK
        value: "true"
      - key: DISABLE_EMBEDDING_MODEL
        value: "true"
      - key: EMBEDDING_ENCODE_BATCH_SIZE
        value: "4"
      - key: SKIP_LANGUAGE_CHART
        value: "true"
      - key: NEIGHBOR_SEARCH_POOL
        value: "120"
      - key: OMP_NUM_THREADS
        value: "1"
      - key: MKL_NUM_THREADS
        value: "1"
      - key: TOKENIZERS_PARALLELISM
        value: "false"
      - key: API_KEY
        generateValue: true

databases:
  - name: peve-db
    plan: free
    databaseName: peve
    user: peve_user
